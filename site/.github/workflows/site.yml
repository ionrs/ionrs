name: Docs Site

# Workflow for the dedicated `ionrs/ionrs.github.io` repo. Builds the
# Starlight site against canonical content checked out from `ionrs/ionrs`
# (LANGUAGE.md, DESIGN.md, examples/*.ion, ion-core/src/stdlib-docs.json,
# editors/vscode/syntaxes/ion.tmLanguage.json) and deploys to GitHub Pages.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Triggered by ionrs/ionrs after canonical content changes.
  repository_dispatch:
    types: [ionrs-content-update]

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout ionrs source
        uses: actions/checkout@v4
        with:
          repository: ionrs/ionrs
          path: ionrs
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          IONRS_REPO: ${{ github.workspace }}/ionrs
      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          retention-days: 7
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: dist

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist
      - name: Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --base dist
            --exclude "^https?://github.com/"
            --exclude "^https?://crates.io/"
            --exclude-loopback
            'dist/**/*.html'
          fail: true

  ion-snippet-check:
    name: Ion snippet check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ionrs/ionrs
          path: ionrs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ionrs
      - name: Build ion CLI
        run: cargo build -p ionrs-cli --release
        working-directory: ionrs
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Sync content
        run: npm ci && npm run sync-manifests
        env:
          IONRS_REPO: ${{ github.workspace }}/ionrs
      - name: Check fenced ion snippets
        run: node scripts/check-ion-snippets.mjs ionrs/target/release/ion
        env:
          IONRS_REPO: ${{ github.workspace }}/ionrs

  deploy:
    name: Deploy
    needs: [build, link-check, ion-snippet-check]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
