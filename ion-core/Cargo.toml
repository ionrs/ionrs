[package]
name = "ion-core"
version = "0.1.0"
edition = "2021"
description = "Embeddable scripting language inspired by Starlark, with a bytecode VM"
license = "MIT OR Apache-2.0"
repository = "https://github.com/paiml/ionlang"
keywords = ["scripting", "embedded", "interpreter", "vm", "language"]
categories = ["compilers", "game-development"]

[features]
default = ["derive", "vm", "optimize"]
obfuscate = ["obfstr"]
derive = ["ion-derive"]
concurrency = []
concurrency-tokio = ["concurrency", "tokio"]
vm = []
optimize = ["vm"]
msgpack = ["rmpv"]

[dependencies]
obfstr = { version = "0.4", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
ion-derive = { path = "../ion-derive", optional = true }
rmpv = { version = "1", optional = true }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "sync", "time"], optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "ion_bench"
harness = false
