[package]
name = "ion-core"
version = "0.1.0"
edition = "2021"

[features]
default = ["derive", "vm", "optimize"]
obfuscate = ["obfstr"]
derive = ["ion-derive"]
concurrency = ["futures"]
vm = []
optimize = ["vm"]

[dependencies]
obfstr = { version = "0.4", optional = true }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
indexmap = { version = "2", features = ["serde"] }
ion-derive = { path = "../ion-derive", optional = true }
futures = { version = "0.3", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "ion_bench"
harness = false
