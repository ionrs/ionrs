name = "Ion"
grammar = "ion"
path_suffixes = ["ion"]
line_comments = ["// "]
tab_size = 4
hard_tabs = false

[brackets]
pairs = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = true },
  { start = "(", end = ")", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "|", end = "|", close = true, newline = false, not_in = ["string", "comment"] },
]

[overrides.string]
disabled_bracket_pairs = ["|"]
