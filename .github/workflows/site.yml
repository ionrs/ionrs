name: Docs Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "site/**"
      - "ion-core/src/stdlib-docs.json"
      - "LANGUAGE.md"
      - "DESIGN.md"
      - "CHANGELOG.md"
      - "README.md"
      - "docs/**"
      - "examples/**"
      - "editors/vscode/syntaxes/**"
      - ".github/workflows/site.yml"

# A push to `main` cancels any in-flight Pages deploy and starts a new one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: "20"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # so `git describe` resolves
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Install
        run: npm ci
        working-directory: site
      - name: Build
        run: npm run build
        working-directory: site
      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          retention-days: 7
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: site/dist

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist
      - name: Lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # `--offline` would skip external URLs entirely; we want internal
          # links checked but skip rate-limited externals (github.com, etc.).
          args: >-
            --no-progress
            --base dist
            --exclude "^https?://github.com/"
            --exclude "^https?://crates.io/"
            --exclude-loopback
            'dist/**/*.html'
          fail: true

  ion-snippet-check:
    name: Ion snippet check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build ion CLI
        run: cargo build -p ionrs-cli --release
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Sync content (need synced .mdx for snippet extraction)
        run: |
          cd site && npm ci && npm run sync-manifests
      - name: Check fenced ion snippets
        # Extract ```ion blocks from canonical sources + synced site
        # content and pipe each through `ion --check`. Doc rot fails CI.
        run: node site/scripts/check-ion-snippets.mjs target/release/ion

  deploy:
    name: Deploy
    needs: [build, link-check, ion-snippet-check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
